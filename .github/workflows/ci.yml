name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      
      - name: Set up Python
        run: uv python install 3.14
        
      - name: Install dependencies
        run: uv sync --all-extras --dev
        
      - name: Run Ruff (Linting)
        run: uv run ruff check .
        
      - name: Run Mypy (Type Checking)
        run: uv run mypy src tests
        
      - name: Run Unit Tests (Pytest)
        run: uv run pytest -v
        
      - name: Run E2E Tests (will skip if hardware/AI is missing)
        run: |
          set +e
          uv run pytest -v -m e2e
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No E2E tests were selected on this runner; treating as success."
            exit 0
          fi
          exit "$status"
