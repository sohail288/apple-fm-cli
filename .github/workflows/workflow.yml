name: CI & CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Build Swift bridge
        run: |
          cd src/apple_fm_sdk/foundation-models-c
          swift build -c release
          mkdir -p ../lib
          cp .build/release/libFoundationModels.dylib ../lib/

      - name: Run Ruff (Linting)
        run: uv run ruff check .

      - name: Run Mypy (Type Checking)
        run: uv run mypy src tests

      - name: Run Unit Tests (Pytest)
        run: uv run pytest -v

      - name: Run E2E Tests (will skip if hardware/AI is missing)
        run: |
          set +e
          uv run pytest -v -m e2e
          status=$?
          set -e
          if [ "$status" -eq 5 ]; then
            echo "No E2E tests were selected on this runner; treating as success."
            exit 0
          fi
          exit "$status"

  publish:
    name: Build and Publish to PyPI
    needs: lint-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Build Swift bridge
        run: |
          cd src/apple_fm_sdk/foundation-models-c
          swift build -c release
          mkdir -p ../lib
          cp .build/release/libFoundationModels.dylib ../lib/

      - name: Verify tag matches pyproject.toml
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          PKG_VER="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error title=Version mismatch::Tag '$GITHUB_REF_NAME' implies $TAG_VER but pyproject.toml has $PKG_VER"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv run --with build python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; skipping create."
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
