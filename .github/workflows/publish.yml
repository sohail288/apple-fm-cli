# Publish sdists/wheels to PyPI.
#
# Setup (one-time on https://pypi.org/manage/account/publishing/ ):
#   - Add a "pending" trusted publisher: GitHub → repo sohail288/apple-fm-cli
#     → workflow: publish.yml → environment: (leave blank unless you use one below)
#   - After the first successful upload, the project is linked.
#
# Triggers:
#   - GitHub Release "published" (recommended: bump version in pyproject.toml, tag, release)
#   - Manual: Actions → Publish to PyPI → Run workflow
#
# Optional: create a GitHub Environment named "pypi" with protection rules, then set
#   environment: pypi
# below and register that environment name on PyPI when adding the trusted publisher.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Build sdist and wheel
        run: uv run --with build python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
